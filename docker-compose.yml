services:
  localdb:
    image: postgres:17.4
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./db/dumps:/app-db-dumps
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  testdb:
    image: postgres:17.4
    env_file:
      - test.env
    ports:
      - "5433:5432"
    volumes:
      - ./db/dumps:/app-db-dumps
